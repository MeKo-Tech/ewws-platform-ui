name: docker

# Thin wrapper around the reusable build-and-push workflow in
# MeKo-Tech/ewws-workflows. Action SHAs + tag conventions
# (sha-<short>, semver, branch, pr) live centrally there.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: MeKo-Tech/ewws-workflows/.github/workflows/build-and-push.yml@v1
    with:
      image-name: ghcr.io/meko-tech/ewws-platform-ui
