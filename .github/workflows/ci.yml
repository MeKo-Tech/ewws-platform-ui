name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go
        # actions/setup-go@v5.2.0
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed
        with:
          go-version: 1.24.x
          cache: true

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.943

      - name: templ generate
        run: templ generate ./...

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed
        with:
          go-version: 1.24.x
          cache: true

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.943

      - name: templ generate
        run: templ generate ./...

      - name: golangci-lint
        # golangci/golangci-lint-action@v6.5.0
        uses: golangci/golangci-lint-action@2226d7cb06a077cd73e56eedd38eecad18e5d837
        with:
          version: v2.0.2
          args: --timeout=5m
