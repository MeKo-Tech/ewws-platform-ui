name: release-please

# Thin wrapper around the reusable workflow in MeKo-Tech/ewws-workflows.
# Action SHAs + release-please config defaults live centrally there;
# here we just point at the config + manifest files this repo already
# maintains.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    uses: MeKo-Tech/ewws-workflows/.github/workflows/release-please.yml@main
    with:
      config-file: release-please-config.json
      manifest-file: .release-please-manifest.json
