# golangci-lint v2 config — matches MeKo house style.
# See: https://golangci-lint.run/usage/configuration/
version: "2"

linters:
  default: standard
  enable:
    - wsl_v5
    - gocritic
  disable:
    - wsl
    - unused # during bootstrap
  settings:
    wsl_v5:
      allow-first-in-block: true
      branch-max-lines: 2
      allow-whole-block: false
      disable:
        - decl
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
      # templ codegen
      - .*_templ\.go$

formatters:
  enable:
    - gci
    - gofumpt
    - goimports
    - golines
