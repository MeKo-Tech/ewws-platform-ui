name: test-pr-title

# Conventional Commits gate on PR titles. Reuses the org-wide workflow
# in MeKo-Tech/ewws-workflows so the regex + action-SHA pinning live
# in one place across all ewws-tagged repos.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    uses: MeKo-Tech/ewws-workflows/.github/workflows/test-pr-title.yml@main
