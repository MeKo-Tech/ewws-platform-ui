name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # googleapis/release-please-action v4.1.4 — pinned by SHA.
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
