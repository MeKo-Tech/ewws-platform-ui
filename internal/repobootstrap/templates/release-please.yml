name: release-please

# Cuts release PRs + semver tags from Conventional Commits. Reuses the
# org-wide workflow in MeKo-Tech/ewws-workflows; release-please-config
# + manifest below are passed in so the reusable knows which file to
# manage (multi-package layout — single-package also works).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    uses: MeKo-Tech/ewws-workflows/.github/workflows/release-please.yml@main
    with:
      config-file: release-please-config.json
      manifest-file: .release-please-manifest.json
